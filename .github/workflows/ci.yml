name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Test core
        working-directory: packages/core
        run: npm test

      - name: Test skills
        working-directory: packages/skills
        run: npm test

      - name: Test CLI
        working-directory: packages/cli
        run: npm test

      - name: Test MCP packages
        run: |
          for pkg in mcp-github mcp-stripe mcp-attio mcp-clickup mcp-notion mcp-google mcp-gmail mcp-drive mcp-calendar; do
            echo "--- $pkg ---"
            (cd packages/$pkg && npm test) || exit 1
          done
