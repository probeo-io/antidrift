name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Test all packages
        run: |
          for pkg in core skills mcp-github mcp-stripe mcp-attio mcp-clickup mcp-notion mcp-google mcp-gmail mcp-drive mcp-calendar cli; do
            echo "--- Testing $pkg ---"
            cd packages/$pkg && npm test && cd ../..
          done
