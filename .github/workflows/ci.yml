name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Test core
        working-directory: packages/core
        run: npm test

      - name: Test skills
        working-directory: packages/skills
        run: npm test

      - name: Test CLI
        working-directory: packages/cli
        run: npm test

      - name: Test MCP packages (no external deps)
        run: |
          for pkg in mcp-github mcp-attio mcp-clickup mcp-notion mcp-cloudflare mcp-linear mcp-netlify mcp-pipedrive mcp-vercel mcp-hubspot-crm mcp-hubspot-marketing mcp-jira mcp-aws; do
            echo "--- $pkg ---"
            cd packages/$pkg
            node --experimental-test-module-mocks --test test/*.mjs
            cd ../..
          done

      - name: Test MCP Google packages (need googleapis)
        run: |
          for pkg in mcp-google mcp-gmail mcp-drive mcp-calendar; do
            echo "--- $pkg ---"
            cd packages/$pkg
            npm install --ignore-scripts 2>/dev/null
            node --experimental-test-module-mocks --test test/*.mjs
            cd ../..
          done

      - name: Test MCP Stripe (needs stripe dep)
        working-directory: packages/mcp-stripe
        run: npm install --ignore-scripts && node --experimental-test-module-mocks --test test/*.mjs
