name: Publish packages

on:
  release:
    types: [published]

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish antidrift (CLI)
        working-directory: packages/cli
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/core
        working-directory: packages/core
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/skills
        working-directory: packages/skills
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-google
        working-directory: packages/mcp-google
        run: npm install --ignore-scripts && npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-gmail
        working-directory: packages/mcp-gmail
        run: npm install --ignore-scripts && npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-drive
        working-directory: packages/mcp-drive
        run: npm install --ignore-scripts && npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-calendar
        working-directory: packages/mcp-calendar
        run: npm install --ignore-scripts && npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-attio
        working-directory: packages/mcp-attio
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-stripe
        working-directory: packages/mcp-stripe
        run: npm install --ignore-scripts && npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-github
        working-directory: packages/mcp-github
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-clickup
        working-directory: packages/mcp-clickup
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-aws
        working-directory: packages/mcp-aws
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-jira
        working-directory: packages/mcp-jira
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-notion
        working-directory: packages/mcp-notion
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-hubspot-crm
        working-directory: packages/mcp-hubspot-crm
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-hubspot-marketing
        working-directory: packages/mcp-hubspot-marketing
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi-core:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build
        working-directory: packages/core-py
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/core-py/dist/
          attestations: false
          verbose: true

