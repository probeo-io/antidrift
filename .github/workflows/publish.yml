name: Publish packages

on:
  release:
    types: [published]

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set version from version.json
        run: |
          VERSION=$(node -e "console.log(require('./version.json').version)")
          for dir in packages/cli packages/core packages/skills \
            packages/mcp-google packages/mcp-gmail packages/mcp-drive packages/mcp-calendar \
            packages/mcp-attio packages/mcp-stripe packages/mcp-github packages/mcp-clickup \
            packages/mcp-aws packages/mcp-aws-s3 packages/mcp-aws-spot \
            packages/mcp-jira packages/mcp-notion \
            packages/mcp-hubspot-crm packages/mcp-hubspot-marketing \
            packages/mcp-cloudflare packages/mcp-linear packages/mcp-netlify \
            packages/mcp-pipedrive packages/mcp-vercel; do
            npm version "${VERSION}" --no-git-tag-version --prefix "$dir" || true
          done

      - name: Publish antidrift (CLI)
        working-directory: packages/cli
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/core
        working-directory: packages/core
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/skills
        working-directory: packages/skills
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-google
        working-directory: packages/mcp-google
        run: npm install --ignore-scripts && npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-gmail
        working-directory: packages/mcp-gmail
        run: npm install --ignore-scripts && npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-drive
        working-directory: packages/mcp-drive
        run: npm install --ignore-scripts && npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-calendar
        working-directory: packages/mcp-calendar
        run: npm install --ignore-scripts && npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-attio
        working-directory: packages/mcp-attio
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-stripe
        working-directory: packages/mcp-stripe
        run: npm install --ignore-scripts && npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-github
        working-directory: packages/mcp-github
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-clickup
        working-directory: packages/mcp-clickup
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-aws
        working-directory: packages/mcp-aws
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-aws-s3
        working-directory: packages/mcp-aws-s3
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-aws-spot
        working-directory: packages/mcp-aws-spot
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-jira
        working-directory: packages/mcp-jira
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-notion
        working-directory: packages/mcp-notion
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-hubspot-crm
        working-directory: packages/mcp-hubspot-crm
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-hubspot-marketing
        working-directory: packages/mcp-hubspot-marketing
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-cloudflare
        working-directory: packages/mcp-cloudflare
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-linear
        working-directory: packages/mcp-linear
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-netlify
        working-directory: packages/mcp-netlify
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-pipedrive
        working-directory: packages/mcp-pipedrive
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @antidrift/mcp-vercel
        working-directory: packages/mcp-vercel
        run: npm publish --access public --provenance || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi-core:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Set version from version.json
        working-directory: packages/core-py
        run: |
          VERSION=$(node -e "console.log(require('../../version.json').version)")
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Build
        working-directory: packages/core-py
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/core-py/dist/
          attestations: false
          verbose: true
