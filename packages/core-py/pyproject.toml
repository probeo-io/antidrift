[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "antidrift"
version = "0.3.0"
description = "Company brain for Claude. One repo your whole team shares — context, skills, and connected services."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Probeo", email = "hello@probeo.io" }]
keywords = ["claude-code", "claude", "skills", "company-brain", "knowledge-management"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

[project.scripts]
antidrift = "antidrift.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/antidrift"]

[project.urls]
Homepage = "https://antidrift.io"
Repository = "https://github.com/probeo-io/antidrift"
Issues = "https://github.com/probeo-io/antidrift/issues"
